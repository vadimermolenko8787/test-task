services:
  php:
    build: .
    volumes:
      - .:/app
    working_dir: /app
    networks:
      - app

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - .:/app
    depends_on:
      - php
    networks:
      - app

networks:
  app:
